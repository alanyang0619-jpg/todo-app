<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>待办事项</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-primary: #5c7aea;
      --color-accent: #ff6b6b;
      --color-success: #51cf66;
      --color-bg: #f8f9fa;
      --color-card: #ffffff;
      --color-text: #212529;
      --color-text-muted: #868e96;
      --color-border: #e9ecef;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --font-h1: 700 24px/1.2 Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-h2: 600 18px/1.3 Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 400 16px/1.5 Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --font-small: 400 13px/1.4 Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      --transition-page: 0.3s ease-out;
      --header-h: 56px;
    }

    [data-theme="dark"] {
      --color-bg: #1a1a2e;
      --color-card: #252540;
      --color-text: #f1f1f5;
      --color-text-muted: #a0a0b0;
      --color-border: #3a3a5c;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.35);
      --shadow-float: 0 8px 24px rgba(0, 0, 0, 0.45);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      font: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg);
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    input, textarea {
      font: inherit;
      color: inherit;
    }

    .app {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      margin: 0 auto;
    }

    @media (min-width: 1025px) {
      .app {
        flex-direction: row;
        align-items: stretch;
        max-width: none;
        margin: 0;
      }
    }

    /* Header */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      min-height: var(--header-h);
      padding: var(--space-sm) var(--space-md);
      background: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
    }

    .header__title {
      font: var(--font-h1);
      margin: 0;
      flex: 1;
      min-width: 0;
    }

    .header__actions {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      color: var(--color-text);
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .icon-btn:hover {
      background: rgba(92, 122, 234, 0.12);
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    .lang-btn {
      min-width: 48px;
      width: auto;
      padding: 0 var(--space-sm);
      font: var(--font-small);
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .icon-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Sidebar (desktop) */
    .sidebar {
      display: none;
      flex-direction: column;
      width: 260px;
      flex-shrink: 0;
      padding: var(--space-md);
      border-right: 1px solid var(--color-border);
      background: var(--color-bg);
      gap: var(--space-sm);
    }

    @media (min-width: 1025px) {
      .sidebar {
        display: flex;
      }
    }

    .sidebar__new {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      background: var(--color-primary);
      color: #fff;
      font-weight: 600;
      margin-bottom: var(--space-sm);
      box-shadow: var(--shadow-card);
    }

    .sidebar__new:hover {
      filter: brightness(1.05);
    }

    .sidebar__new svg {
      width: 20px;
      height: 20px;
    }

    .nav-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      font: var(--font-body);
      color: var(--color-text-muted);
      text-align: left;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .nav-item:hover {
      background: rgba(92, 122, 234, 0.08);
      color: var(--color-text);
    }

    .nav-item.is-active {
      background: rgba(92, 122, 234, 0.15);
      color: var(--color-primary);
      font-weight: 600;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-top: auto;
      padding-top: var(--space-lg);
      font: var(--font-small);
      color: var(--color-text-muted);
    }

    .stats span {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
    }

    .stats strong {
      color: var(--color-text);
      font-weight: 600;
    }

    /* Main */
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: var(--space-md);
      padding-bottom: calc(88px + env(safe-area-inset-bottom, 0));
      overflow: hidden;
    }

    @media (min-width: 1025px) {
      .main {
        padding: var(--space-lg);
        padding-bottom: var(--space-lg);
      }
    }

    .view-title {
      font: var(--font-h2);
      margin: 0 0 var(--space-md);
    }

    .panels {
      position: relative;
      flex: 1;
      min-height: 200px;
      overflow: hidden;
    }

    .panel {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      overflow-x: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateX(12px);
      transition: opacity var(--transition-page), transform var(--transition-page);
    }

    .panel.is-active {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    @media (min-width: 769px) {
      .panel {
        transform: none;
        transition: opacity 0.25s ease;
      }
    }

    /* Task list */
    .task-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }

    .task-item {
      display: flex;
      align-items: stretch;
      gap: var(--space-sm);
      padding: var(--space-md);
      border-radius: var(--radius-md);
      background: var(--color-card);
      box-shadow: var(--shadow-card);
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
      animation: taskIn 0.35s ease backwards;
      transition: background 0.15s, border-color 0.15s, transform 0.25s ease, max-height 0.25s ease, opacity 0.25s ease, margin 0.25s ease;
      touch-action: pan-y;
    }

    @keyframes taskIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
    }

    .task-item[data-stagger] {
      animation-delay: calc(var(--i, 0) * 50ms);
    }

    .task-item:hover {
      background: var(--color-bg);
    }

    [data-theme="light"] .task-item:hover {
      background: #f8f9fa;
    }

    [data-theme="dark"] .task-item:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .task-item.is-done .task-item__text {
      color: var(--color-text-muted);
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      transition: color 0.2s ease, text-decoration-color 0.2s ease;
    }

    .task-item.is-selected {
      border-color: var(--color-primary);
    }

    .task-item.is-removing {
      transform: translateX(-100%);
      opacity: 0;
      max-height: 0;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      border: none;
    }

    .task-item__swipe-bg {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: var(--space-md);
      font: var(--font-small);
      font-weight: 600;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .task-item__swipe-bg--delete {
      justify-content: flex-start;
      background: var(--color-accent);
    }

    .task-item__swipe-bg--star {
      background: var(--color-primary);
    }

    .task-item.show-swipe-left .task-item__swipe-bg--delete {
      opacity: 1;
    }

    .task-item.show-swipe-right .task-item__swipe-bg--star {
      opacity: 1;
    }

    .task-item__inner {
      display: flex;
      align-items: flex-start;
      gap: var(--space-md);
      width: 100%;
      position: relative;
      z-index: 1;
      background: inherit;
      transition: transform 0.15s ease-out;
    }

    .checkbox-wrap {
      flex-shrink: 0;
      padding-top: 2px;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .checkbox.is-checked {
      border-color: var(--color-success);
      background: var(--color-success);
      animation: checkPop 0.15s ease;
    }

    @keyframes checkPop {
      0% { transform: scale(0.9); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .checkbox svg {
      width: 14px;
      height: 14px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .checkbox.is-checked svg {
      opacity: 1;
    }

    .task-item__body {
      flex: 1;
      min-width: 0;
    }

    .task-item__text {
      margin: 0;
      word-break: break-word;
    }

    .task-item__meta {
      margin-top: var(--space-xs);
      font: var(--font-small);
      color: var(--color-text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    .task-item__meta .overdue {
      color: var(--color-accent);
      font-weight: 600;
    }

    .task-item__actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
      flex-shrink: 0;
    }

    .task-item:hover .task-item__actions .ghost-btn {
      opacity: 1;
    }

    .ghost-btn {
      padding: var(--space-xs) var(--space-sm);
      border-radius: var(--radius-sm);
      font: var(--font-small);
      color: var(--color-text-muted);
      opacity: 0.7;
      transition: opacity 0.15s, background 0.15s, color 0.15s;
    }

    .ghost-btn:hover {
      background: rgba(255, 107, 107, 0.12);
      color: var(--color-accent);
    }

    .ghost-btn--star:hover {
      background: rgba(92, 122, 234, 0.15);
      color: var(--color-primary);
    }

    @media (max-width: 768px) {
      .ghost-btn {
        opacity: 1;
      }
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: var(--space-2xl) var(--space-md);
      color: var(--color-text-muted);
    }

    .empty__art {
      font-size: 48px;
      line-height: 1;
      margin-bottom: var(--space-md);
      opacity: 0.85;
    }

    .empty__title {
      font: var(--font-h2);
      color: var(--color-text);
      margin: 0 0 var(--space-sm);
    }

    .empty__desc {
      margin: 0;
      font: var(--font-body);
    }

    /* Add task */
    .add-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: calc(56px + env(safe-area-inset-bottom, 0));
      z-index: 40;
      padding: var(--space-sm) var(--space-md);
      background: linear-gradient(to top, var(--color-bg) 70%, transparent);
      pointer-events: none;
    }

    .add-dock > * {
      pointer-events: auto;
    }

    @media (min-width: 1025px) {
      .add-dock {
        position: static;
        padding: 0 0 var(--space-md);
        background: none;
        max-width: 720px;
      }
    }

    .add-card {
      border-radius: var(--radius-lg);
      background: var(--color-card);
      box-shadow: var(--shadow-float);
      border: 1px solid var(--color-border);
      overflow: hidden;
      animation: addSlide 0.2s ease;
    }

    @keyframes addSlide {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
    }

    .add-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
    }

    .add-input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: var(--space-sm) 0;
      min-width: 0;
    }

    .add-expand {
      border-top: 1px solid var(--color-border);
      padding: var(--space-md);
      display: none;
      flex-direction: column;
      gap: var(--space-md);
    }

    .add-card.is-open .add-expand {
      display: flex;
    }

    .add-card.is-open .add-toggle svg {
      transform: rotate(180deg);
    }

    .add-toggle svg {
      transition: transform 0.2s ease;
    }

    .field-label {
      font: var(--font-small);
      color: var(--color-text-muted);
      display: block;
      margin-bottom: var(--space-xs);
    }

    .field-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    .date-input {
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      border: 1px solid var(--color-border);
      background: var(--color-bg);
      color: var(--color-text);
    }

    .add-actions {
      display: flex;
      justify-content: flex-end;
      gap: var(--space-sm);
    }

    .btn {
      padding: var(--space-sm) var(--space-lg);
      border-radius: var(--radius-sm);
      font-weight: 600;
      transition: filter 0.15s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn--secondary {
      background: transparent;
      color: var(--color-text-muted);
      border: 1px solid var(--color-border);
    }

    .btn--secondary:hover {
      background: rgba(92, 122, 234, 0.08);
      color: var(--color-text);
    }

    .btn--primary {
      background: var(--color-primary);
      color: #fff;
    }

    .btn--primary:hover {
      filter: brightness(1.05);
    }

    /* Bottom tab bar (mobile) */
    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 45;
      display: flex;
      align-items: stretch;
      justify-content: space-around;
      min-height: 56px;
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: var(--color-card);
      border-top: 1px solid var(--color-border);
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
    }

    [data-theme="dark"] .tabbar {
      box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.35);
    }

    @media (min-width: 1025px) {
      .tabbar {
        display: none;
      }
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: var(--space-xs);
      font: var(--font-small);
      color: var(--color-text-muted);
      min-width: 0;
    }

    .tab svg {
      width: 22px;
      height: 22px;
    }

    .tab.is-active {
      color: var(--color-primary);
      font-weight: 600;
    }

    .tab span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      font-size: 11px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="Navigation">
      <button type="button" class="sidebar__new" id="btnSidebarNew">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 5v14M5 12h14" />
        </svg>
        <span data-i18n="add_task">添加任务</span>
      </button>
      <ul class="nav-list" role="tablist">
        <li>
          <button type="button" class="nav-item is-active" data-view="all" role="tab" aria-selected="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6"/></svg>
            <span data-i18n="nav_all">全部任务</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-view="today" role="tab" aria-selected="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h18M5 6h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/><path d="M8 14h.01M12 14h.01M16 14h.01"/></svg>
            <span data-i18n="nav_today">今日</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-view="important" role="tab" aria-selected="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.09 6.26L20 9.27l-5 3.64L17.18 21 12 17.77 6.82 21 9 12.91l-5-3.64 5.91-.01z"/></svg>
            <span data-i18n="nav_important">重要</span>
          </button>
        </li>
        <li>
          <button type="button" class="nav-item" data-view="completed" role="tab" aria-selected="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            <span data-i18n="nav_completed">已完成</span>
          </button>
        </li>
      </ul>
      <div class="stats" id="sidebarStats" aria-live="polite"></div>
    </aside>

    <div class="main-wrap">
      <header class="header">
        <h1 class="header__title" data-i18n="app_title">待办事项</h1>
        <div class="header__actions">
          <button type="button" class="icon-btn" id="btnTheme" aria-label="Toggle theme" title="Theme">
            <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
            </svg>
            <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
            </svg>
          </button>
          <button type="button" class="icon-btn lang-btn" id="btnLang" aria-label="Toggle language">中</button>
        </div>
      </header>

      <main class="main">
        <h2 class="view-title" id="viewTitle" data-i18n="nav_all">全部任务</h2>
        <div class="panels">
          <div class="panel is-active" id="panel-all" data-panel="all" role="tabpanel"></div>
          <div class="panel" id="panel-today" data-panel="today" role="tabpanel"></div>
          <div class="panel" id="panel-important" data-panel="important" role="tabpanel"></div>
          <div class="panel" id="panel-completed" data-panel="completed" role="tabpanel"></div>
        </div>
      </main>

      <div class="add-dock">
        <div class="add-card" id="addCard">
          <div class="add-row">
            <button type="button" class="icon-btn add-toggle" id="addToggle" aria-expanded="false" aria-label="Expand">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <input type="text" class="add-input" id="addInput" data-i18n-placeholder="add_task_placeholder" placeholder="输入任务内容..." autocomplete="off" />
          </div>
          <div class="add-expand" id="addExpand">
            <div>
              <label class="field-label" for="dueInput" data-i18n="due_date">截止日期</label>
              <input type="date" class="date-input" id="dueInput" />
            </div>
            <div class="add-actions">
              <button type="button" class="btn btn--secondary" id="btnAddCancel" data-i18n="cancel">取消</button>
              <button type="button" class="btn btn--primary" id="btnAddConfirm" data-i18n="add">添加</button>
            </div>
          </div>
        </div>
      </div>

      <nav class="tabbar" aria-label="Mobile navigation">
        <button type="button" class="tab is-active" data-view="all">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M7 8h10M7 12h6"/></svg>
          <span data-i18n="nav_all">全部任务</span>
        </button>
        <button type="button" class="tab" data-view="today">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h18M5 6h14a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
          <span data-i18n="nav_today">今日</span>
        </button>
        <button type="button" class="tab" data-view="important">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l2.09 6.26L20 9.27l-5 3.64L17.18 21 12 17.77 6.82 21 9 12.91l-5-3.64 5.91-.01z"/></svg>
          <span data-i18n="nav_important">重要</span>
        </button>
        <button type="button" class="tab" data-view="completed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
          <span data-i18n="nav_completed">已完成</span>
        </button>
      </nav>
    </div>
  </div>

  <script>
(function () {
  'use strict';

  var STORAGE_TASKS = 'todo-app-tasks-v1';
  var STORAGE_THEME = 'todo-app-theme';
  var STORAGE_LANG = 'todo-app-lang';

  var i18n = {
    'zh-CN': {
      app_title: '待办事项',
      nav_all: '全部任务',
      nav_today: '今日',
      nav_important: '重要',
      nav_completed: '已完成',
      add_task: '添加任务',
      add_task_placeholder: '输入任务内容...',
      no_tasks: '暂无任务',
      no_tasks_desc: '点击下方按钮添加第一个任务吧',
      stat_total: '全部',
      stat_today: '今日',
      stat_important: '重要',
      cancel: '取消',
      add: '添加',
      due_date: '截止日期',
      delete: '删除',
      mark_important: '标记重要'
    },
    'en-US': {
      app_title: 'Todo',
      nav_all: 'All Tasks',
      nav_today: 'Today',
      nav_important: 'Important',
      nav_completed: 'Completed',
      add_task: 'Add Task',
      add_task_placeholder: 'Enter task...',
      no_tasks: 'No tasks yet',
      no_tasks_desc: 'Tap the button below to add your first task',
      stat_total: 'All',
      stat_today: 'Today',
      stat_important: 'Important',
      cancel: 'Cancel',
      add: 'Add',
      due_date: 'Due Date',
      delete: 'Delete',
      mark_important: 'Mark as important'
    }
  };

  var currentLang = 'zh-CN';
  var currentView = 'all';
  var tasks = [];

  function getLang() {
    try {
      var s = localStorage.getItem(STORAGE_LANG);
      if (s === 'en-US' || s === 'zh-CN') return s;
    } catch (e) {}
    return 'zh-CN';
  }

  function applyLanguage(lang) {
    currentLang = lang;
    try {
      localStorage.setItem(STORAGE_LANG, lang);
    } catch (e) {}
    document.documentElement.lang = lang === 'zh-CN' ? 'zh-CN' : 'en-US';
    applyI18n();
    updateLangButton();
  }

  function t(key) {
    var pack = i18n[currentLang] || i18n['zh-CN'];
    return pack[key] != null ? pack[key] : key;
  }

  function applyI18n() {
    document.querySelectorAll('[data-i18n]').forEach(function (el) {
      var k = el.getAttribute('data-i18n');
      el.textContent = t(k);
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(function (el) {
      var k = el.getAttribute('data-i18n-placeholder');
      el.setAttribute('placeholder', t(k));
    });
    var vt = document.getElementById('viewTitle');
    if (vt) {
      var map = { all: 'nav_all', today: 'nav_today', important: 'nav_important', completed: 'nav_completed' };
      vt.setAttribute('data-i18n', map[currentView] || 'nav_all');
      vt.textContent = t(map[currentView] || 'nav_all');
    }
    document.title = t('app_title');
  }

  function updateLangButton() {
    var btn = document.getElementById('btnLang');
    if (!btn) return;
    btn.textContent = currentLang === 'zh-CN' ? 'EN' : '中';
    btn.setAttribute('aria-label', currentLang === 'zh-CN' ? 'Switch to English' : '切换到中文');
  }

  function getTheme() {
    try {
      var s = localStorage.getItem(STORAGE_THEME);
      if (s === 'dark' || s === 'light') return s;
    } catch (e) {}
    return 'light';
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    try {
      localStorage.setItem(STORAGE_THEME, theme);
    } catch (e) {}
    var sun = document.getElementById('iconSun');
    var moon = document.getElementById('iconMoon');
    if (sun && moon) {
      sun.style.display = theme === 'light' ? 'block' : 'none';
      moon.style.display = theme === 'dark' ? 'block' : 'none';
    }
  }

  function loadTasks() {
    try {
      var raw = localStorage.getItem(STORAGE_TASKS);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) tasks = parsed;
      }
    } catch (e) {
      tasks = [];
    }
  }

  function saveTasks() {
    try {
      localStorage.setItem(STORAGE_TASKS, JSON.stringify(tasks));
    } catch (e) {}
  }

  function uid() {
    return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 9);
  }

  function parseYMD(s) {
    if (!s) return null;
    var p = s.split('-');
    if (p.length !== 3) return null;
    return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
  }

  function isDueTodayOrOverdue(dueDateStr) {
    if (!dueDateStr) return false;
    var due = parseYMD(dueDateStr);
    if (!due || isNaN(due.getTime())) return false;
    var start = new Date();
    start.setHours(0, 0, 0, 0);
    var end = new Date();
    end.setHours(23, 59, 59, 999);
    return due <= end;
  }

  function filterTasks(view) {
    return tasks.filter(function (task) {
      if (view === 'completed') return task.completed;
      if (view === 'all') return true;
      if (task.completed) return false;
      if (view === 'important') return task.important;
      if (view === 'today') {
        if (!task.dueDate) return false;
        return isDueTodayOrOverdue(task.dueDate);
      }
      return true;
    });
  }

  function sortTasks(list) {
    return list.slice().sort(function (a, b) {
      if (a.completed !== b.completed) return a.completed ? 1 : -1;
      return (b.createdAt || 0) - (a.createdAt || 0);
    });
  }

  function updateStats() {
    var el = document.getElementById('sidebarStats');
    if (!el) return;
    var total = tasks.filter(function (t) { return !t.completed; }).length;
    var td = tasks.filter(function (t) {
      return !t.completed && t.dueDate && isDueTodayOrOverdue(t.dueDate);
    }).length;
    var imp = tasks.filter(function (t) { return !t.completed && t.important; }).length;
    el.innerHTML =
      '<span><strong>' + total + '</strong> ' + escapeHtml(t('stat_total')) + '</span> · ' +
      '<span><strong>' + td + '</strong> ' + escapeHtml(t('stat_today')) + '</span> · ' +
      '<span><strong>' + imp + '</strong> ' + escapeHtml(t('stat_important')) + '</span>';
  }

  function escapeHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderTaskItem(task, index, view) {
    var li = document.createElement('li');
    li.className = 'task-item' + (task.completed ? ' is-done' : '') + (task.selected ? ' is-selected' : '');
    li.style.setProperty('--i', String(index));
    li.setAttribute('data-stagger', '');
    li.dataset.id = task.id;

    var swipeDel = document.createElement('div');
    swipeDel.className = 'task-item__swipe-bg task-item__swipe-bg--delete';
    swipeDel.textContent = t('delete');

    var swipeStar = document.createElement('div');
    swipeStar.className = 'task-item__swipe-bg task-item__swipe-bg--star';
    swipeStar.textContent = t('mark_important');

    var inner = document.createElement('div');
    inner.className = 'task-item__inner';

    var cbWrap = document.createElement('div');
    cbWrap.className = 'checkbox-wrap';
    var cbBtn = document.createElement('button');
    cbBtn.type = 'button';
    cbBtn.className = 'checkbox' + (task.completed ? ' is-checked' : '');
    cbBtn.setAttribute('aria-label', task.completed ? 'Uncomplete' : 'Complete');
    cbBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>';
    cbWrap.appendChild(cbBtn);

    var body = document.createElement('div');
    body.className = 'task-item__body';
    var p = document.createElement('p');
    p.className = 'task-item__text';
    p.textContent = task.text;
    body.appendChild(p);

    if (task.dueDate) {
      var meta = document.createElement('div');
      meta.className = 'task-item__meta';
      var overdue = !task.completed && parseYMD(task.dueDate) < new Date(new Date().setHours(0, 0, 0, 0));
      var span = document.createElement('span');
      if (overdue) span.className = 'overdue';
      span.textContent = t('due_date') + ': ' + task.dueDate;
      meta.appendChild(span);
      body.appendChild(meta);
    }

    var actions = document.createElement('div');
    actions.className = 'task-item__actions';

    var starBtn = document.createElement('button');
    starBtn.type = 'button';
    starBtn.className = 'ghost-btn ghost-btn--star';
    starBtn.textContent = task.important ? '★' : '☆';
    starBtn.title = t('mark_important');

    var delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'ghost-btn';
    delBtn.textContent = t('delete');
    delBtn.title = t('delete');

    actions.appendChild(starBtn);
    actions.appendChild(delBtn);

    inner.appendChild(cbWrap);
    inner.appendChild(body);
    inner.appendChild(actions);

    li.appendChild(swipeDel);
    li.appendChild(swipeStar);
    li.appendChild(inner);

    cbBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleComplete(task.id);
    });

    starBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleImportant(task.id);
    });

    delBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      removeTaskAnimated(task.id, li);
    });

    li.addEventListener('click', function (e) {
      if (e.target.closest('button')) return;
      selectTask(task.id);
    });

    attachSwipe(li, inner, task);

    return li;
  }

  function attachSwipe(li, inner, task) {
    var startX = 0;
    var x = 0;

    function onStart(clientX) {
      startX = clientX;
      x = 0;
      li.classList.remove('show-swipe-left', 'show-swipe-right');
    }

    function onMove(clientX) {
      x = clientX - startX;
      var max = 80;
      var clamped = Math.max(-max, Math.min(max, x));
      inner.style.transform = 'translateX(' + clamped + 'px)';
      if (clamped < -24) li.classList.add('show-swipe-left');
      else li.classList.remove('show-swipe-left');
      if (clamped > 24) li.classList.add('show-swipe-right');
      else li.classList.remove('show-swipe-right');
    }

    function onEnd() {
      inner.style.transform = '';
      if (x < -70) removeTaskAnimated(task.id, li);
      else if (x > 70) toggleImportant(task.id);
      li.classList.remove('show-swipe-left', 'show-swipe-right');
    }

    inner.addEventListener(
      'touchstart',
      function (e) {
        if (e.touches.length !== 1) return;
        onStart(e.touches[0].clientX);
      },
      { passive: true }
    );

    inner.addEventListener(
      'touchmove',
      function (e) {
        if (e.touches.length !== 1) return;
        onMove(e.touches[0].clientX);
      },
      { passive: true }
    );

    inner.addEventListener('touchend', function () {
      onEnd();
    });
  }

  function selectTask(id) {
    tasks = tasks.map(function (t) {
      return { id: t.id, text: t.text, completed: t.completed, important: t.important, dueDate: t.dueDate, createdAt: t.createdAt, selected: t.id === id ? !t.selected : false };
    });
    saveTasks();
    render();
  }

  function toggleComplete(id) {
    tasks = tasks.map(function (t) {
      if (t.id !== id) return t;
      return Object.assign({}, t, { completed: !t.completed });
    });
    saveTasks();
    render();
  }

  function toggleImportant(id) {
    tasks = tasks.map(function (t) {
      if (t.id !== id) return t;
      return Object.assign({}, t, { important: !t.important });
    });
    saveTasks();
    render();
  }

  function removeTaskAnimated(id, li) {
    li.classList.add('is-removing');
    setTimeout(function () {
      tasks = tasks.filter(function (t) {
        return t.id !== id;
      });
      saveTasks();
      render();
    }, 250);
  }

  function renderPanel(view) {
    var panel = document.getElementById('panel-' + view);
    if (!panel) return;
    panel.innerHTML = '';
    var list = sortTasks(filterTasks(view));
    if (list.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML =
        '<div class="empty__art" aria-hidden="true">📋</div>' +
        '<p class="empty__title" data-i18n="no_tasks">' + escapeHtml(t('no_tasks')) + '</p>' +
        '<p class="empty__desc" data-i18n="no_tasks_desc">' + escapeHtml(t('no_tasks_desc')) + '</p>';
      panel.appendChild(empty);
      return;
    }
    var ul = document.createElement('ul');
    ul.className = 'task-list';
    list.forEach(function (task, i) {
      ul.appendChild(renderTaskItem(task, i, view));
    });
    panel.appendChild(ul);
  }

  function render() {
    ['all', 'today', 'important', 'completed'].forEach(renderPanel);
    updateStats();
    syncNav();
  }

  function syncNav() {
    document.querySelectorAll('.nav-item[data-view], .tab[data-view]').forEach(function (btn) {
      var v = btn.getAttribute('data-view');
      var active = v === currentView;
      btn.classList.toggle('is-active', active);
      if (btn.classList.contains('nav-item')) btn.setAttribute('aria-selected', active ? 'true' : 'false');
    });
    document.querySelectorAll('.panel').forEach(function (p) {
      p.classList.toggle('is-active', p.getAttribute('data-panel') === currentView);
    });
    var vt = document.getElementById('viewTitle');
    if (vt) {
      var map = { all: 'nav_all', today: 'nav_today', important: 'nav_important', completed: 'nav_completed' };
      vt.setAttribute('data-i18n', map[currentView] || 'nav_all');
      vt.textContent = t(map[currentView] || 'nav_all');
    }
  }

  function setView(view) {
    currentView = view;
    syncNav();
    var vt = document.getElementById('viewTitle');
    if (vt) {
      var map = { all: 'nav_all', today: 'nav_today', important: 'nav_important', completed: 'nav_completed' };
      vt.textContent = t(map[view] || 'nav_all');
    }
  }

  function addTaskFromForm() {
    var input = document.getElementById('addInput');
    var due = document.getElementById('dueInput');
    var card = document.getElementById('addCard');
    var text = (input && input.value || '').trim();
    if (!text) return;
    tasks.push({
      id: uid(),
      text: text,
      completed: false,
      important: false,
      dueDate: due && due.value ? due.value : null,
      createdAt: Date.now(),
      selected: false
    });
    input.value = '';
    if (due) due.value = '';
    if (card) card.classList.remove('is-open');
    saveTasks();
    render();
  }

  function init() {
    loadTasks();
    applyLanguage(getLang());
    setTheme(getTheme());
    render();

    document.getElementById('btnTheme').addEventListener('click', function () {
      var next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      setTheme(next);
    });

    document.getElementById('btnLang').addEventListener('click', function () {
      applyLanguage(currentLang === 'zh-CN' ? 'en-US' : 'zh-CN');
      render();
    });

    document.querySelectorAll('.nav-item[data-view], .tab[data-view]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        setView(btn.getAttribute('data-view'));
      });
    });

    document.getElementById('btnSidebarNew').addEventListener('click', function () {
      document.getElementById('addInput').focus();
    });

    var addCard = document.getElementById('addCard');
    var addToggle = document.getElementById('addToggle');
    var addInput = document.getElementById('addInput');

    addToggle.addEventListener('click', function () {
      addCard.classList.toggle('is-open');
      addToggle.setAttribute('aria-expanded', addCard.classList.contains('is-open') ? 'true' : 'false');
    });

    document.getElementById('btnAddCancel').addEventListener('click', function () {
      addCard.classList.remove('is-open');
      addToggle.setAttribute('aria-expanded', 'false');
    });

    document.getElementById('btnAddConfirm').addEventListener('click', addTaskFromForm);

    addInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        addTaskFromForm();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
  </script>
</body>
</html>
